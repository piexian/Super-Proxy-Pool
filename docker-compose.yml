version: "3.9"

services:
  super-proxy-pool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: super-proxy-pool
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      MIHOMO_BINARY: /usr/local/bin/mihomo
    volumes:
      - ./data:/data
    ports:
      - "7890:7890"
      - "18080-18120:18080-18120"

  super-proxy-pool-host:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: super-proxy-pool-host
    restart: unless-stopped
    network_mode: host
    environment:
      DATA_DIR: /data
      MIHOMO_BINARY: /usr/local/bin/mihomo
    volumes:
      - ./data:/data
    profiles:
      - host
