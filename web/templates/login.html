{{define "body"}}
<main class="login-shell">

    <h1>Super-Proxy-Pool</h1>
    <p>输入管理密码进入面板。默认密码为 <code>admin</code>。</p>
    <form id="loginForm" class="stack-form">
      <label>
        <span>密码</span>

      <button type="submit">登录</button>
    </form>
  </section>
</main>
{{end}}
